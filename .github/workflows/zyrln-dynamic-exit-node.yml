name: zyrln-dynamic-exit-node

on:
  workflow_dispatch:
    inputs:
      vpn_enabled:
        description: 'Route all traffic through WireGuard VPN (requires WG_CONFIG secret)'
        type: boolean
        default: false

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Set up WireGuard VPN (if enabled)"
        id: vpn
        run: |
          # <--- insert the VPN setup block from above --->

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build relay binary
        run: go build -o zyrln-relay .github/script/zyrln-vps-exit-node.go

      - name: Start relay in background
        env:
          ZYRLN_RELAY_LISTEN: 127.0.0.1:8787
          ZYRLN_RELAY_KEY: ${{ secrets.TUNNEL_AUTH_KEY }}
        run: |
          chmod +x zyrln-relay
          ./zyrln-relay &
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:8787/healthz >/dev/null 2>&1; then
              echo "Relay is up"
              break
            fi
            sleep 0.5
          done

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared --version

      - name: Create public URL
        run: |
          ./cloudflared tunnel --url http://127.0.0.1:8787 2>&1 | tee tunnel.log &
          sleep 5
          grep -oP 'https://.*?\.trycloudflare\.com' tunnel.log | head -1 > tunnel-url.txt
          echo "================================================================="
          echo "PUBLIC RELAY URL: $(cat tunnel-url.txt)"
          echo "================================================================="

      - name: Keep alive
        run: sleep 21600
